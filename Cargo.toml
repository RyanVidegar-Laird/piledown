[package]
name = "piledown"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.95"
arrow = { version = "54.0.0", features = ["pyarrow"] }
clap = { version = "4.5.26", features = ["derive"] }
clap-verbosity-flag = "3.0.2"
csv = "1.3.1"
env_logger = "0.11.6"
fnv = "1.0.7"
futures = "0.3.31"
indexmap = { version = "2.7.1", features = ["serde"] }
lazy_static = "1.5.0"
log = "0.4.25"
noodles = { version = "0.87.0", features = ["core", "sam", "bam", "async"] }
parquet = "54.0.0"
pyo3 = { version = "0.23.4", features = ["extension-module", "anyhow"] }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.135"

[profile.release]
opt-level = 3
strip = "symbols"
codegen-units = 1
lto = true
panic = "abort"

